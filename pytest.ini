[pytest]
addopts = -q --strict-markers
testpaths = tests
xfail_strict = true
markers =
    integration: integration tests that stay in the default software-only suite
    vision: computer vision/image-video analysis tests that use bundled or synthetic fixtures
    groundtruth: tests that require optional saved ground-truth media/data; run with --run-groundtruth
    network: tests that open sockets or require an active local/network stack; run with --run-network
    slow: tests that are intentionally slower than the quick trust check; run with --run-slow
    hardware: tests that require physical ROV hardware
